<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Contactos Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --success: #25D366; --info: #3498db; --danger: #e74c3c; --warning: #f39c12; --excel: #107c41; --bg-cell: #f8fafc; --border-cell: #e2e8f0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #eef2f5; margin: 0; padding: 15px; }
        .card { background: white; padding: 25px 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 480px; margin: auto; }
        h2 { text-align: center; color: var(--primary); margin-top: 0; font-size: 24px; margin-bottom: 25px; }
        
        .cell-group { background: var(--bg-cell); border: 1px solid var(--border-cell); border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .cell-title { font-size: 13px; color: #64748b; margin-top: 0; margin-bottom: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #cbd5e1; padding-bottom: 6px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-full { grid-column: span 2; }
        @media (max-width: 400px) { .grid-2 { grid-template-columns: 1fr; } .grid-full { grid-column: span 1; } }

        label { display: block; margin: 0 0 5px; font-weight: bold; font-size: 13px; color: #334155; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 15px; transition: 0.3s; background: white; }
        input:focus, select:focus { border-color: var(--info); outline: none; box-shadow: 0 0 0 3px rgba(52,152,219,0.2); }
        input.error, select.error { border-color: var(--danger); background-color: #fce4e4; }
        
        .radio-group { display: flex; gap: 20px; padding: 5px 0; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 5px; }
        
        button { border: none; border-radius: 8px; padding: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 15px; }
        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .btn-wa { background: var(--success); }
        .btn-call { background: var(--info); }
        .btn-mail { background: var(--danger); }
        .btn-save { background: var(--primary); width: 100%; font-size: 17px; margin-bottom: 10px; }
        .btn-history { background: #94a3b8; width: 100%; margin-top: 10px; }
        .btn-excel { background: var(--excel); width: 100%; }
        .btn-reset { background: transparent; color: #94a3b8; border: 1px solid #cbd5e1; width: 100%; margin-top: 15px; font-size: 12px; padding: 8px; }
        
        .ocr-box { border: 2px dashed #94a3b8; padding: 15px; text-align: center; border-radius: 10px; background: white; cursor: pointer; transition: 0.3s; }
        .ocr-box:hover { border-color: var(--info); background: #f0f8ff; }
        #ocr-status { font-size: 12px; color: #64748b; margin-top: 8px; font-weight: bold; }
        
        #image-preview { width: 100%; max-height: 200px; object-fit: contain; border-radius: 8px; display: none; margin-top: 10px; }
        #raw-text-box { display: none; margin-top: 15px; text-align: left; }
        #raw-text-box label { color: var(--danger); font-size: 12px; border: none; padding: 0; }
        #raw-text { font-family: monospace; font-size: 11px; background: #eee; height: 80px; resize: vertical; }

        #toast { visibility: hidden; min-width: 250px; margin-left: -125px; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; font-size: 15px; opacity: 0; transition: opacity 0.5s, bottom 0.5s; }
        #toast.show { visibility: visible; bottom: 50px; opacity: 1; }
        .toast-success { background-color: var(--success); }
        .toast-error { background-color: var(--danger); }

        #motivo-container { display: none; margin-top: 12px; animation: fadeIn 0.3s ease-in-out; }
        
        /* ALERTA DE DUPLICADOS */
        #alerta-duplicado { display: none; background: #fef2f2; border: 1px solid #f87171; color: #b91c1c; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: bold; margin-bottom: 15px; text-align: center; animation: fadeIn 0.3s ease-in-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <h2>Registro de Contactos</h2>
    
    <form id="contactForm">

        <div class="cell-group">
            <h3 class="cell-title">📷 Escáner Inteligente</h3>
            <div class="ocr-box" onclick="document.getElementById('ocr-upload').click()">
                <label style="cursor: pointer; color: var(--info); font-size: 15px; margin: 0;">Haz clic aquí para subir captura</label>
                <input type="file" id="ocr-upload" accept="image/*" onchange="procesarOCR(this)" style="display: none;">
                
                <img id="image-preview" src="" alt="Vista previa">
                <div id="ocr-status">El sistema rellenará los datos por ti</div>

                <div id="raw-text-box">
                    <label>🔍 Texto leído (Diagnóstico):</label>
                    <textarea id="raw-text" readonly></textarea>
                </div>
            </div>
        </div>

        <div class="cell-group">
            <h3 class="cell-title">👤 Datos del Contacto</h3>
            
            <div id="alerta-duplicado">⚠️ ATENCIÓN: Este contacto ya ha sido guardado o exportado previamente.</div>

            <div class="grid-2">
                <div class="grid-full">
                    <label>Nombre del cliente *</label>
                    <input type="text" id="nombre" placeholder="Nombre y Apellidos" required>
                </div>
                <div>
                    <label>Teléfono *</label>
                    <input type="tel" id="telefono" placeholder="+34..." required oninput="comprobarDuplicado()">
                </div>
                <div>
                    <label>Fecha de alta</label>
                    <input type="date" id="fecha" required>
                </div>
                <div class="grid-full">
                    <label>Correo electrónico</label>
                    <input type="text" id="email" placeholder="correo@ejemplo.com">
                </div>
                <div class="grid-full">
                    <label>Población / Ciudad</label>
                    <input type="text" id="poblacion" placeholder="Ej: Madrid, Barcelona...">
                </div>
            </div>
        </div>

        <div class="cell-group">
            <h3 class="cell-title">🏷️ Clasificación del Lead</h3>
            <div class="grid-2">
                <div>
                    <label>Tipo de contacto</label>
                    <div class="radio-group">
                        <label><input type="radio" name="tipo" value="Lead" checked> Lead</label>
                        <label><input type="radio" name="tipo" value="Zona"> Zona</label>
                    </div>
                </div>
                <div>
                    <label>Estado *</label>
                    <select id="estado" onchange="verificarEstado()">
                        <option value="Contactado" selected>Contactado</option>
                        <option value="Firmado">Firmado</option>
                        <option value="K.O">K.O (Perdido)</option>
                    </select>
                </div>
            </div>
            <div id="motivo-container">
                <label>Motivo del K.O *</label>
                <input type="text" id="motivo" placeholder="Indica por qué se ha perdido el lead...">
            </div>
        </div>

        <div class="cell-group">
            <h3 class="cell-title">🚀 Acciones Rápidas</h3>
            <div class="btn-group">
                <button type="button" class="btn-wa" onclick="contactar('wa')">WhatsApp</button>
                <button type="button" class="btn-call" onclick="contactar('tel')">Llamar</button>
                <button type="button" class="btn-mail" onclick="contactar('mail')">Email</button>
            </div>
        </div>

        <div class="cell-group" style="background: #e0f2fe; border-color: #bae6fd;">
            <h3 class="cell-title" style="color: #0284c7; border-color: #7dd3fc;">💾 Guardar y Exportar</h3>
            <label style="color: #0369a1;">📥 Destino en Google Sheets:</label>
            <select id="destino_hoja" style="margin-bottom: 15px;">
                <option value="Hoja 1" selected>Pestaña Principal (Hoja 1)</option>
                <option value="Leads Marzo">Campaña Leads Marzo</option>
                <option value="Descartados">Pestaña Descartados</option>
            </select>
            
            <button type="button" class="btn-save" onclick="guardarEnNube()">☁️ Guardar en Google Sheets</button>
            <button type="button" class="btn-excel" onclick="descargarExcel()">📊 Compartir como Excel (.csv)</button>
            <button type="button" class="btn-history" onclick="verHistorial()">📂 Abrir Excel Completo</button>
            
            <button type="button" class="btn-reset" onclick="limpiarMemoria()">🗑️ Borrar memoria de duplicados (Reset)</button>
        </div>

    </form>
</div>

<div id="toast"></div>

<script>
    const SCRIPT_URL = "PEGA_AQUI_TU_URL_DE_IMPLEMENTACION"; 
    const SHEET_URL = "PEGA_AQUI_LA_URL_DE_TU_EXCEL";

    document.getElementById('fecha').valueAsDate = new Date();

    // --- FUNCIONES DE MEMORIA ANTI-DUPLICADOS ---
    function esDuplicado() {
        const telefonoBruto = document.getElementById('telefono').value;
        if (!telefonoBruto) return false;
        const telLimpio = telefonoBruto.replace(/\D/g, '');
        let leadsGuardados = JSON.parse(localStorage.getItem('leads_memoria') || '[]');
        return leadsGuardados.includes(telLimpio);
    }

    function registrarLeadExportado() {
        const telefonoBruto = document.getElementById('telefono').value;
        if (!telefonoBruto) return;
        const telLimpio = telefonoBruto.replace(/\D/g, '');
        let leadsGuardados = JSON.parse(localStorage.getItem('leads_memoria') || '[]');
        if (!leadsGuardados.includes(telLimpio)) {
            leadsGuardados.push(telLimpio);
            localStorage.setItem('leads_memoria', JSON.stringify(leadsGuardados));
        }
    }

    function comprobarDuplicado(mostrarPopUp = false) {
        const alerta = document.getElementById('alerta-duplicado');
        if (esDuplicado()) {
            alerta.style.display = 'block';
            if (mostrarPopUp) {
                // Lanza el aviso en medio de la pantalla al instante
                setTimeout(() => alert("⚠️ AVISO: El teléfono de esta captura ya ha sido exportado o guardado anteriormente."), 100);
            }
        } else {
            alerta.style.display = 'none';
        }
    }

    function limpiarMemoria() {
        if(confirm("¿Seguro que quieres borrar la memoria de duplicados? Esto hará que la app olvide todos los leads pasados.")) {
            localStorage.removeItem('leads_memoria');
            document.getElementById('alerta-duplicado').style.display = 'none';
            mostrarNotificacion('Memoria borrada', 'exito');
        }
    }
    // ---------------------------------------------

    function verificarEstado() {
        const estado = document.getElementById('estado').value;
        const motivoContainer = document.getElementById('motivo-container');
        const motivoInput = document.getElementById('motivo');

        if (estado === 'K.O') {
            motivoContainer.style.display = 'block';
        } else {
            motivoContainer.style.display = 'none';
            motivoInput.value = ''; 
            motivoInput.classList.remove('error');
        }
    }

    function mostrarNotificacion(mensaje, tipo) {
        const toast = document.getElementById("toast");
        toast.innerText = mensaje;
        toast.className = tipo === 'exito' ? 'toast-success show' : 'toast-error show';
        setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
    }

    function contactar(via) {
        let telBase = document.getElementById('telefono').value;
        const mail = document.getElementById('email').value;
        
        if (via === 'wa' && telBase) {
            let telWhatsApp = telBase.replace(/\D/g, ''); 
            if (telWhatsApp.length === 9 && (telWhatsApp.startsWith('6') || telWhatsApp.startsWith('7'))) {
                telWhatsApp = '34' + telWhatsApp;
            }
            window.open(`https://api.whatsapp.com/send?phone=${telWhatsApp}`);
        }
        else if (via === 'tel' && telBase) {
            const telLlamada = telBase.replace(/\s+/g, '');
            window.location.href = `tel:${telLlamada}`;
        }
        else if (via === 'mail' && mail) {
            window.location.href = `mailto:${mail}`;
        }
        else {
            mostrarNotificacion('Falta el dato de contacto para esta acción', 'error');
        }
    }

    async function descargarExcel() {
        if (!validarFormulario()) {
            mostrarNotificacion('Por favor, rellena los campos obligatorios (*)', 'error');
            return;
        }

        if (esDuplicado()) {
            const seguir = confirm("⚠️ ATENCIÓN: Ya has exportado o guardado este lead anteriormente.\n\n¿Seguro que quieres generar el archivo de nuevo?");
            if (!seguir) return; 
        }

        // GUARDAMOS EN MEMORIA EL TELÉFONO ANTES DE EXPORTAR
        registrarLeadExportado();
        document.getElementById('alerta-duplicado').style.display = 'none'; // Ocultamos la alerta porque ya asumimos que lo quieres duplicar a propósito

        const fecha = document.getElementById('fecha').value || '';
        const nombre = document.getElementById('nombre').value || 'Sin_Nombre';
        const telefono = document.getElementById('telefono').value || '';
        const email = document.getElementById('email').value || '';
        const poblacion = document.getElementById('poblacion').value || '';
        const tipo = document.querySelector('input[name="tipo"]:checked').value;
        const estado = document.getElementById('estado').value;
        const motivo = document.getElementById('motivo').value || '';
        
        const nombreArchivo = `Lead_${nombre.replace(/\s+/g, '_')}.csv`;
        let csvContent = "\uFEFF"; 
        csvContent += "Fecha,Nombre,Teléfono,Email,Población,Tipo,Estado,Motivo KO\n";
        const escaparCSV = (texto) => `"${texto.replace(/"/g, '""')}"`;
        csvContent += `${escaparCSV(fecha)},${escaparCSV(nombre)},${escaparCSV(telefono)},${escaparCSV(email)},${escaparCSV(poblacion)},${escaparCSV(tipo)},${escaparCSV(estado)},${escaparCSV(motivo)}\n`;

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const file = new File([blob], nombreArchivo, { type: 'text/csv' });

        try {
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({
                    title: `Datos de ${nombre}`,
                    text: `Te comparto los datos del lead: ${nombre}`,
                    files: [file]
                });
                mostrarNotificacion('✅ Archivo compartido con éxito', 'exito');
            } else {
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = nombreArchivo;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                mostrarNotificacion('⬇️ Archivo Excel descargado', 'exito');
            }
        } catch (error) {
            console.error(error);
            if (error.name !== "AbortError") {
                mostrarNotificacion('❌ Error al procesar el archivo', 'error');
            }
        }
    }

    async function procesarOCR(input) {
        const status = document.getElementById('ocr-status');
        const imgPreview = document.getElementById('image-preview');
        const rawTextBox = document.getElementById('raw-text-box');
        const rawText = document.getElementById('raw-text');

        if (!input.files[0]) return;
        
        const fileURL = URL.createObjectURL(input.files[0]);
        imgPreview.src = fileURL;
        imgPreview.style.display = 'block';
        rawTextBox.style.display = 'none'; 
        
        document.getElementById('email').value = "";
        document.getElementById('telefono').value = "";
        document.getElementById('nombre').value = "";
        document.getElementById('poblacion').value = "";
        document.getElementById('alerta-duplicado').style.display = 'none';

        status.innerText = "⏳ Analizando captura de lead...";
        
        try {
            const { data: { text } } = await Tesseract.recognize(input.files[0], 'spa');
            rawText.value = text; 
            
            let emailEncontrado = "";
            let textoLimpio = text.toLowerCase();
            let lineas = textoLimpio.split('\n').map(l => l.trim()).filter(l => l.length > 3);
            
            const dominiosComunes = ['gmail.com', 'hotmail.com', 'yahoo.es', 'yahoo.com', 'outlook.com', 'icloud.com', 'mac.com', 'live.com', 'msn.com'];

            for (let linea of lineas) {
                let lineaAplaniada = linea.replace(/\s+/g, '');
                if (lineaAplaniada.includes('@') && lineaAplaniada.includes('.')) {
                    emailEncontrado = lineaAplaniada.replace(/correo|email|electrónico|dirección/g, '');
                    break;
                }
                
                let dominioDetectado = dominiosComunes.find(d => lineaAplaniada.includes(d));
                if (dominioDetectado) {
                    let correoRoto = lineaAplaniada.replace(/correo|email|electrónico|dirección/g, '');
                    if (!correoRoto.includes('@')) {
                        correoRoto = correoRoto.replace(dominioDetectado, '@' + dominioDetectado);
                    }
                    emailEncontrado = correoRoto;
                    break;
                }
            }

            if (emailEncontrado) {
                emailEncontrado = emailEncontrado.replace(/^[^a-z0-9]+/i, '');
                document.getElementById('email').value = emailEncontrado;
            }

            const phoneRegex = /\+?\d{9,15}/;
            for (let linea of lineas) {
                let match = linea.match(phoneRegex);
                if (match) {
                    document.getElementById('telefono').value = match[0];
                    break;
                }
            }

            let nameIdx = lineas.findIndex(l => l.includes('full name') || l.includes('nombre completo') || l === 'nombre');
            if (nameIdx !== -1 && nameIdx + 1 < lineas.length) {
                document.getElementById('nombre').value = lineas[nameIdx + 1];
            } else {
                let primeraLinea = lineas.find(l => l.length > 5 && !/\d/.test(l) && !l.includes('@') && !dominiosComunes.some(d => l.includes(d)));
                if (primeraLinea) document.getElementById('nombre').value = primeraLinea;
            }

            let cityIdx = lineas.findIndex(l => l.includes('city') || l.includes('ciudad') || l.includes('población'));
            if (cityIdx !== -1 && cityIdx + 1 < lineas.leng
